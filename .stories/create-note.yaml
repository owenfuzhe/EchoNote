name: create-note
description: User creates a new note via + button and AI chat
steps:
  - action: navigate
    url: http://localhost:3000
  
  - action: wait
    time: 2000
  
  - action: screenshot
    name: 01-home-initial
  
  - action: click
    selector: "button[aria-label='添加']"
    wait: 500
  
  - action: screenshot
    name: 02-capture-menu-opened
  
  - action: click
    selector: "button[aria-label='关闭']"
    wait: 300
  
  - action: screenshot
    name: 03-capture-menu-closed
  
  - action: assert
    type: visible
    selector: "h1"
    expected: "EchoNote"
    timeout: 3000
