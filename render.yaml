services:
  - type: web
    name: echonote-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run build:parser
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: BAILIAN_API_KEY
        sync: false
      - key: BAILIAN_BASE_URL
        value: https://dashscope.aliyuncs.com/api/v1
      - key: BAILIAN_MODEL
        value: qwen-max
      - key: AI_PROVIDER
        value: demo
      - key: TTS_PROVIDER
        value: demo
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: DEFAULT_OWNER_ID
        value: render-bootstrap-user
      - key: DEFAULT_OWNER_NAME
        value: EchoNote MVP User
